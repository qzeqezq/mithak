<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة وتسوّق التجار</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-5">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-800">منصة التاجر الذكية</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">إضافة سلعة جديدة</h2>
                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="اسم السلعة" class="w-full p-2 border rounded">
                    <input type="number" id="pPrice" placeholder="السعر" class="w-full p-2 border rounded">
                    <select id="pCategory" class="w-full p-2 border rounded">
                        <option value="الحليب ومشتقاته">الحليب ومشتقاته</option>
                        <option value="اللحوم">اللحوم</option>
                        <option value="الخضر والفواكه">الخضر والفواكه</option>
                        <option value="مواد تنظيف">مواد تنظيف</option>
                    </select>
                    <div class="flex gap-2">
                        <input type="text" id="pBarcode" placeholder="الباركود" class="w-full p-2 border rounded">
                        <button onclick="simulateScan()" class="bg-gray-200 px-3 rounded hover:bg-gray-300">📷</button>
                    </div>
                    <button onclick="addProduct()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">إضافة للقائمة</button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-4 rounded-lg shadow-md flex gap-4">
                    <input type="text" id="searchBar" onkeyup="filterProducts()" placeholder="ابحث بالاسم أو الباركود..." class="w-full p-2 border rounded">
                    <select id="filterCategory" onchange="filterProducts()" class="p-2 border rounded">
                        <option value="الكل">كل الأصناف</option>
                        <option value="الحليب ومشتقاته">الحليب ومشتقاته</option>
                        <option value="اللحوم">اللحوم</option>
                        <option value="الخضر والفواكه">الخضر والفواكه</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="productsList">
                    </div>
            </div>
        </div>

        <div class="fixed bottom-5 left-5 bg-green-600 text-white p-4 rounded-full shadow-xl cursor-pointer hover:scale-110 transition" onclick="toggleCart()">
            🛒 <span id="cartCount">0</span>
        </div>

        <div id="cartModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-md rounded-lg p-6">
                <h2 class="text-2xl font-bold mb-4 text-center">سلة المشتريات</h2>
                <div id="cartItems" class="max-h-64 overflow-y-auto mb-4 border-b pb-4"></div>
                <div class="text-xl font-bold text-left mb-4">الإجمالي: <span id="cartTotal">0</span> دج</div>
                <div class="flex gap-2">
                    <button onclick="toggleCart()" class="flex-1 bg-gray-500 text-white py-2 rounded">إغلاق</button>
                    <button onclick="clearCart()" class="flex-1 bg-red-500 text-white py-2 rounded">تفريغ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let products = [
            { id: 1, name: "حليب كونيا", price: 100, category: "الحليب ومشتقاته", barcode: "12345" },
            { id: 2, name: "تفاح أحمر", price: 350, category: "الخضر والفواكه", barcode: "67890" }
        ];
        let cart = [];

        function renderProducts(data) {
            const list = document.getElementById('productsList');
            list.innerHTML = data.map(p => `
                <div class="bg-white p-4 rounded-lg shadow border-r-4 border-blue-500 flex justify-between items-center cursor-pointer hover:bg-blue-50" onclick="addToCart(${p.id})">
                    <div>
                        <h3 class="font-bold text-lg">${p.name}</h3>
                        <p class="text-sm text-gray-500">${p.category} | ${p.barcode}</p>
                    </div>
                    <div class="text-blue-600 font-bold">${p.price} دج</div>
                </div>
            `).join('');
        }

        function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const category = document.getElementById('pCategory').value;
            const barcode = document.getElementById('pBarcode').value;

            if(name && price && barcode) {
                products.push({ id: Date.now(), name, price: Number(price), category, barcode });
                renderProducts(products);
                clearInputs();
            } else {
                alert("يرجى ملء جميع الحقول");
            }
        }

        function filterProducts() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const cat = document.getElementById('filterCategory').value;

            const filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(term) || p.barcode.includes(term);
                const matchesCat = cat === "الكل" || p.category === cat;
                return matchesSearch && matchesCat;
            });
            renderProducts(filtered);
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const cartItems = document.getElementById('cartItems');
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            
            cartItems.innerHTML = cart.map((p, index) => `
                <div class="flex justify-between py-2 border-b text-sm">
                    <span>${p.name}</span>
                    <span class="font-bold">${p.price} دج</span>
                </div>
            `).join('');
            document.getElementById('cartTotal').innerText = total;
        }

        function toggleCart() {
            document.getElementById('cartModal').classList.toggle('hidden');
        }

        function clearCart() {
            cart = [];
            updateCartUI();
            toggleCart();
        }

        function simulateScan() {
            const mockBarcode = Math.floor(Math.random() * 90000) + 10000;
            document.getElementById('pBarcode').value = mockBarcode;
        }

        function clearInputs() {
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pBarcode').value = '';
        }

        // التشغيل الأولي
        renderProducts(products);
    </script>
</body>
</html>
